{% extends 'templates/pages/new_base.html' %}

{% block jc_content %}
<h4 class="text-center mt-3">Form on JC Agency Master</h4>

<form class="mt-4 p-3 col-8 card m-auto jc-form" id="agent">
  <div class="d-flex justify-content-between mb-2">
    <div>
      <div class="d-flex gap-2 align-items-center">
        <label class="custom-label">Indentor</label>
        <input type="text" id="indentor" name="indentor"/>
      </div>
    </div>
    <div>
      <div class="d-flex gap-2">
        <label class="custom-label">Inspection Agency</label>
        <input type="text" id="inspection_agency" name="inspection_agency"/>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-between mb-2">
    <div>
      <div class="d-flex gap-2 align-items-center">
        <label class="custom-label">Agency Code</label>
        <input type="text" id="agency_code" name="agency_code"/>
      </div>
    </div>
    <div>
      <div class="d-flex gap-2">
        <label class="custom-label">Agency Name</label>
        <input type="text" id="agency_name" name="agency_name"/>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-between mb-2">
    <div>
      <div class="d-flex gap-2 align-items-center">
        <label class="custom-label">Address</label>
        <input type="text" id="address" name="address"/>
      </div>
    </div>
    <div>
      <div class="d-flex gap-2">
        <label class="custom-label">State</label>
        <input type="text" id="state" name="state"/>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center gap-2 mt-3">
    <div class="d-flex gap-2">
      <button class="customBtn" type="button">Cancel</button>
      <button class="customBtn" id="submit" type="submit">Apply Changes</button>
    </div>
  </div>
</form>

{% endblock %}

{% block scripts %} 
    <script src="/assets/estate_app/js/jc-agency-master.js"></script>
{% endblock %}
